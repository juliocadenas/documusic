version: '3.8'

services:
  documusic_backend:
    build: ./backend
    container_name: documusic_backend
    init: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /home/pepe/AI_MODELS/YuE:/app/models
      - /home/pepe/documusic/outputs:/app/outputs
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    networks:
      - documusic_net
    restart: always

  ollama_hub:
    image: ollama/ollama:latest
    container_name: ollama_hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - documusic_net
    restart: always

networks:
  documusic_net:
    driver: bridge

volumes:
  ollama_data:
