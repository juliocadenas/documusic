version: '3.8'

services:
  documusic_backend:
    build: ./backend
    container_name: documusic_backend
    init: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Modelos centralizados en el Hub
      - /home/pepe/AI_MODELS/huggingface:/app/models
      # ACE-Step repo + checkpoints (persistente en host)
      - /home/pepe/AI_MODELS/ace-step:/opt/ACE-Step
      # HeartMuLa repo (persistente en host)
      - /home/pepe/AI_MODELS/heartlib:/opt/heartlib
      # DiffRhythm2 repo (persistente en host)
      - /home/pepe/AI_MODELS/DiffRhythm2:/opt/DiffRhythm2
      # Outputs persistentes
      - ./outputs:/app/outputs
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTHONUNBUFFERED=1
    networks:
      - documusic_net
    restart: always

  ollama_hub:
    image: ollama/ollama:latest
    container_name: ollama_hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      # Mapeo directo al Hub Central de Ollama
      - /home/pepe/AI_MODELS/ollama:/root/.ollama
    networks:
      - documusic_net
    restart: always

networks:
  documusic_net:
    driver: bridge
